name: Build iOS IPA (Sideload)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned IPA
        run: |
          xcodebuild -project MultiLens.xcodeproj \
            -scheme MultiLens \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "*.app" -path "*/Release-iphoneos/*" -type d | head -1)

          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            mkdir -p $RUNNER_TEMP/Payload
            cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
            cd $RUNNER_TEMP
            zip -r MultiLens.ipa Payload/
            echo "IPA created at $RUNNER_TEMP/MultiLens.ipa"
            ls -lh $RUNNER_TEMP/MultiLens.ipa
          else
            echo "ERROR: .app bundle not found"
            find $RUNNER_TEMP/DerivedData -name "*.app" -type d 2>/dev/null || echo "No .app found"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MultiLens-IPA
          path: ${{ runner.temp }}/MultiLens.ipa
          retention-days: 90
          if-no-files-found: error
